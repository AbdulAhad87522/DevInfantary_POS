version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pos_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: harware
      MYSQL_USER: posuser
      MYSQL_PASSWORD: pos123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      timeout: 20s
      retries: 10

  backend:
    build: ./Backend
    container_name: pos_backend
    restart: always
    ports:
      - "5050:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=harware;User=posuser;Password=pos123;
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./Frontend/angular
    container_name: pos_frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data: