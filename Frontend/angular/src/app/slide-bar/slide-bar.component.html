<aside class="sidebar" #sidebar 
  [ngClass]="{ 'open': isMobileMenuOpen, 'collapsed': isCollapsed }">

  <div class="sidebar-header">
  
  <!-- ✅ Full logo — click karne par collapse -->
  <div class="logo" *ngIf="!isCollapsed" 
       (click)="onToggleCollapse()" 
       style="cursor: pointer;"
       title="Collapse Sidebar">
    <span class="logo-icon">💼</span> Devinfantary POS
  </div>

  <!-- Collapsed: sirf icon centered — collapse button expand karega -->
  <div class="logo logo-small" *ngIf="isCollapsed" title="Devinfantary POS">
    💼
  </div>

  <!-- Collapse/Expand button -->
  <button class="collapse-btn" (click)="onToggleCollapse()" 
    [title]="isCollapsed ? 'Expand Sidebar' : 'Collapse Sidebar'">
    <span *ngIf="!isCollapsed">◀</span>
    <span *ngIf="isCollapsed">▶</span>
  </button>

  <!-- Mobile close -->
  <button class="close-btn hamburger" (click)="toggleMobileMenu()">
    <span class="bar bar1"></span>
    <span class="bar bar2"></span>
    <span class="bar bar3"></span>
  </button>
</div>
  <nav class="sidebar-nav">
    <ul #menuItems>
      <li [routerLinkActive]="'active'">
        <a routerLink="/" (click)="isMobileMenuOpen && toggleMobileMenu()" [title]="isCollapsed ? 'Dashboard' : ''">
          <svg class="icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
          <span class="nav-text" *ngIf="!isCollapsed">Dashboard</span>
        </a>
      </li>
      <li [routerLinkActive]="'active'">
        <a routerLink="/inventory" (click)="isMobileMenuOpen && toggleMobileMenu()" [title]="isCollapsed ? 'Inventory' : ''">
          <svg class="icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM4 18V8h16v10H4z"/></svg>
          <span class="nav-text" *ngIf="!isCollapsed">Inventory</span>
        </a>
      </li>
      <li [routerLinkActive]="'active'">
        <a routerLink="/batches" (click)="isMobileMenuOpen && toggleMobileMenu()" [title]="isCollapsed ? 'Batches' : ''">
          <svg class="icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z"/></svg>
          <span class="nav-text" *ngIf="!isCollapsed">Batches</span>
        </a>
      </li>
      <li [routerLinkActive]="'active'">
        <a routerLink="/sell-product" (click)="isMobileMenuOpen && toggleMobileMenu()" [title]="isCollapsed ? 'Sell Product' : ''">
          <svg class="icon" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM17 18c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2zM7 13h10l3-8H5.82L7 13z"/></svg>
          <span class="nav-text" *ngIf="!isCollapsed">Sell Product</span>
        </a>
      </li>
      <li [routerLinkActive]="'active'">
        <a routerLink="/suppliers" (click)="isMobileMenuOpen && toggleMobileMenu()" [title]="isCollapsed ? 'Suppliers' : ''">
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <span class="nav-text" *ngIf="!isCollapsed">Suppliers</span>
        </a>
      </li>
      <li [routerLinkActive]="'active'">
        <a routerLink="/supplier-bills" (click)="isMobileMenuOpen && toggleMobileMenu()" [title]="isCollapsed ? 'Supplier Bills' : ''">
          <svg class="icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
          <span class="nav-text" *ngIf="!isCollapsed">Supplier Bills</span>
        </a>
      </li>
      <li [routerLinkActive]="'active'">
        <a routerLink="/customer-bills" (click)="isMobileMenuOpen && toggleMobileMenu()" [title]="isCollapsed ? 'Customer Bills' : ''">
          <svg class="icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v16l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          <span class="nav-text" *ngIf="!isCollapsed">Customer Bills</span>
        </a>
      </li>
      <li [routerLinkActive]="'active'">
        <a routerLink="/customers" (click)="isMobileMenuOpen && toggleMobileMenu()" [title]="isCollapsed ? 'Customers' : ''">
          <svg class="icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          <span class="nav-text" *ngIf="!isCollapsed">Customers</span>
        </a>
      </li>
      <li [routerLinkActive]="'active'">
        <a routerLink="/return-items" (click)="isMobileMenuOpen && toggleMobileMenu()" [title]="isCollapsed ? 'Return Items' : ''">
          <svg class="icon" viewBox="0 0 24 24"><path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/></svg>
          <span class="nav-text" *ngIf="!isCollapsed">Return Items</span>
        </a>
      </li>
      <li [routerLinkActive]="'active'">
        <a routerLink="/quotations" (click)="isMobileMenuOpen && toggleMobileMenu()" [title]="isCollapsed ? 'Quotations' : ''">
          <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
          <span class="nav-text" *ngIf="!isCollapsed">Quotations</span>
        </a>
      </li>
    </ul>
  </nav>
</aside>

<button class="menu-toggle hamburger" (click)="toggleMobileMenu()" aria-label="Toggle menu">
  <span class="bar bar1"></span>
  <span class="bar bar2"></span>
  <span class="bar bar3"></span>
</button>
