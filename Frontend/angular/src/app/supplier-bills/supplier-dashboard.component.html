<div class="bills-container">
  <!-- Heading -->
  <h1 class="page-title">Supplier Bills</h1>

  <!-- Search & Refresh Section -->
  <div class="search-section">
    <div class="search-wrapper">
      <input
        type="text"
        class="search-input"
        placeholder="Search by Supplier name"
        [(ngModel)]="searchTerm"
        (input)="onSearch()"
      />
      <button class="clear-btn" (click)="onClearSearch()" *ngIf="searchTerm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <button class="btn refresh-btn" (click)="onRefresh()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
      </svg>
      Refresh
    </button>
  </div>

  <!-- Table -->
  <div class="table-section">
    <div class="table-wrapper">
      <table class="bills-table">
        <thead>
          <tr>
            <th>Supplier</th>
            <th>Total</th>
            <th>Paid</th>
            <th>Pending</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let bill of filteredBills">
            <td class="supplier-cell">{{ bill.supplier_name }}</td>
            <td class="amount-cell">{{ bill.total | currency:'USD':'symbol':'1.2-2' }}</td>
            <td class="amount-cell paid">{{ bill.paid | currency:'USD':'symbol':'1.2-2' }}</td>
            <td class="amount-cell pending">{{ bill.pending | currency:'USD':'symbol':'1.2-2' }}</td>
            <td>
              <span class="status-badge" [class]="bill.status.toLowerCase()">{{ bill.status }}</span>
            </td>
            <td class="actions-cell">
              <button class="btn view" (click)="onViewDetails(bill)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                View Details
              </button>
              <button class="btn payment" (click)="onAddPayment(bill)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="1" x2="12" y2="23"></line>
                  <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                Add Payment
              </button>
            </td>
          </tr>
          <tr *ngIf="filteredBills.length === 0" class="empty-row">
            <td colspan="6">No bills found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
