<!-- Add this inside <div class="customer-container"> or at the end of your template -->

<!-- Add Customer Modal (Template-Driven Form) -->
<div *ngIf="showAddForm" class="modal-overlay" (click)="closeAddForm()">
  <div class="add-customer-modal" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h2>Add New Supplier</h2>
<button class="close-btn" type="button" routerLink="/suppliers">×</button>    </div>

    <form 
      #supplierForm="ngForm" 
      (ngSubmit)="onSubmitCustomer(supplierForm)"
      class="customer-form"
      novalidate
    >
      <!-- Full Name -->
      <div class="form-group">
        <label for="fullName">Supplier Name <span class="required">*</span></label>
        <input
          type="text"
          id="fullName"
          name="fullName"
          [(ngModel)]="fullname"
          #fullNameCtrl="ngModel"
          required
          minlength="2"
          placeholder="Enter full name"
          class="form-control"
          [class.invalid]="fullNameCtrl.invalid && fullNameCtrl.touched"
        />
        <div class="error-message" *ngIf="fullNameCtrl.invalid && fullNameCtrl.touched">
          <div *ngIf="fullNameCtrl.errors?.['required']">Name is required</div>
          <div *ngIf="fullNameCtrl.errors?.['minlength']">Name must be at least 2 characters</div>
        </div>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="phone">Contact Number <span class="required">*</span></label>
        <input
          type="tel"
          id="phone"
          name="phone"
          [(ngModel)]="phone"
          #phoneCtrl="ngModel"
          required
          placeholder="+92 300 1234567 or 0300 1234567"
          class="form-control"
          [class.invalid]="phoneCtrl.invalid && phoneCtrl.touched"
        />
      </div>

      <!-- Address -->
      <div class="form-group">
        <label for="address">Address</label>
        <textarea
          id="address"
          name="address"
          [(ngModel)]="address"
          #addressCtrl="ngModel"
          rows="3"
          placeholder="House/Flat, Street, Area, City"
          class="form-control textarea"
        ></textarea>
      </div>

      <!-- NEW: Pending Amount Field -->
      <div class="form-group">
        <label for="pendingAmount">Pending Amount (₨)</label>
        <input
          type="number"
          id="pendingAmount"
          name="pendingAmount"
          [(ngModel)]="pendingAmount"
          #pendingAmountCtrl="ngModel"
          min="0"
          step="100"
          placeholder="Enter amount you owe to supplier"
          class="form-control"
        />
        <small class="hint" style="color: #6b7280; font-size: 0.75rem; margin-top: 0.25rem; display: block;">
          This will be set as the supplier's opening balance
        </small>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
       <button type="button" class="btn cancel" routerLink="/suppliers">Cancel</button>


        <button 
          type="submit" 
          class="btn save"
          [disabled]="supplierForm.invalid"
        >
          Save Supplier
        </button>
      </div>
    </form>
  </div>
</div>
