<!-- Add Supplier Modal -->
<div *ngIf="showAddForm" class="modal-overlay" (click)="closeAddForm()">
  <div class="add-customer-modal" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h2>Add New Supplier</h2>
      <!-- FIX: routerLink hata ke (click)="closeAddForm()" lagaya -->
      <button class="close-btn" type="button" (click)="closeAddForm()">×</button>
    </div>

    <form 
      #supplierForm="ngForm" 
      (ngSubmit)="onSubmitCustomer(supplierForm)"
      class="customer-form"
      novalidate
    >
      <!-- Full Name -->
      <div class="form-group">
        <label for="fullName">Supplier Name <span class="required">*</span></label>
        <input
          type="text"
          id="fullName"
          name="fullName"
          [(ngModel)]="fullname"
          #fullNameCtrl="ngModel"
          required
          minlength="2"
          placeholder="Enter full name"
          class="form-control"
          [class.invalid]="fullNameCtrl.invalid && fullNameCtrl.touched"
        />
        <div class="error-message" *ngIf="fullNameCtrl.invalid && fullNameCtrl.touched">
          <div *ngIf="fullNameCtrl.errors?.['required']">Name is required</div>
          <div *ngIf="fullNameCtrl.errors?.['minlength']">Name must be at least 2 characters</div>
        </div>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="phone">Contact Number <span class="required">*</span></label>
        <input
          type="tel"
          id="phone"
          name="phone"
          [(ngModel)]="phone"
          #phoneCtrl="ngModel"
          required
          placeholder="+92 300 1234567 or 0300 1234567"
          class="form-control"
          [class.invalid]="phoneCtrl.invalid && phoneCtrl.touched"
        />
      </div>

      <!-- Address -->
      <div class="form-group">
        <label for="address">Address</label>
        <textarea
          id="address"
          name="address"
          [(ngModel)]="address"
          #addressCtrl="ngModel"
          rows="3"
          placeholder="House/Flat, Street, Area, City"
          class="form-control textarea"
        ></textarea>
      </div>

      

      <!-- Form Actions -->
      <div class="form-actions">
        <!-- FIX: routerLink hata ke (click)="closeAddForm()" lagaya -->
        <button type="button" class="btn cancel" (click)="closeAddForm()">Cancel</button>

        <button 
          type="submit" 
          class="btn save"
          [disabled]="supplierForm.invalid || isLoading"
        >
          {{ isLoading ? 'Saving...' : 'Save Supplier' }}
        </button>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" style="
        margin-top: 0.75rem;
        padding: 0.6rem 0.9rem;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 8px;
        color: #dc2626;
        font-size: 0.8rem;
      ">
        {{ errorMessage }}
      </div>

    </form>
  </div>
</div>
