<div class="bills-container">
  <!-- Heading -->
  <h1 class="page-title">Customer Bills</h1>

  <!-- Search & Refresh Section -->
  <div class="search-section">
    <div class="search-wrapper">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="M21 21l-4.35-4.35"></path>
      </svg>
      <input
        type="text"
        class="search-input"
        placeholder="Search by Customer Name"
        [(ngModel)]="searchTerm"
        (input)="onSearch()"
      />
      <button class="clear-btn" (click)="onClearSearch()" *ngIf="searchTerm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <button class="btn refresh-btn" (click)="onRefresh()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
      </svg>
      Refresh
    </button>
  </div>

  <!-- Table -->
  <div class="table-section">
    <div class="table-wrapper">
      <table class="bills-table">
        <thead>
          <tr>
            <th>Full Name</th>
            <th>Total Amount</th>
            <th>Paid</th>
            <th>Remaining</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let bill of filteredBills">
            <td class="name-cell">{{ bill.full_name }}</td>
            <td class="amount-cell">{{ bill.total_amount | currency:'USD':'symbol':'1.2-2' }}</td>
            <td class="amount-cell paid">{{ bill.paid | currency:'USD':'symbol':'1.2-2' }}</td>
            <td class="amount-cell" [class.remaining-positive]="bill.remaining > 0" [class.remaining-zero]="bill.remaining === 0">
              {{ bill.remaining | currency:'USD':'symbol':'1.2-2' }}
            </td>
            <td class="actions-cell">
              <button class="btn payment-btn" (click)="onPayment(bill)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="1" x2="12" y2="23"></line>
                  <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                Payment
              </button>
              <button class="btn details-btn" (click)="onDetails(bill)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                Details
              </button>
            </td>
          </tr>
          <tr *ngIf="filteredBills.length === 0" class="empty-row">
            <td colspan="5">No bills found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
